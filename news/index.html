<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новости — Государственное учреждение образования «Урицкая средняя школа»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-base="../">
  <a class="skip-link" href="#main" data-i18n="skip.link">Перейти к содержимому</a>
  <div data-include="../partials/header.html"></div>
  <main id="main">
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumbs" aria-label="Хлебные крошки">
          <a data-href="index.html" data-i18n="nav.home">Главная</a>
          <span>/</span>
          <span data-i18n="news.title">Новости</span>
        </nav>
        <h1 data-i18n="news.title">Новости</h1>
        <p class="lead" data-i18n="news.lead">Актуальные события, достижения, проекты и жизнь школы.</p>
        <div class="hero__actions">
          <a class="btn btn--ghost" data-href="archive/index.html" data-i18n="news.archive">Архив</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="list-controls">
          <div class="input-group">
            <label class="label" for="newsSearch" data-i18n="news.search.label">Поиск по заголовку</label>
            <input class="input" type="search" id="newsSearch" placeholder="Введите ключевые слова" aria-label="Поиск новостей" data-i18n-attr="placeholder:search.placeholder;aria-label:news.search.aria" />
          </div>
          <div class="input-group">
            <label class="label" for="newsTagFilter" data-i18n="news.tag.label">Тег</label>
            <select class="select" id="newsTagFilter" aria-label="Фильтр по тегам" data-i18n-attr="aria-label:news.tag.aria"></select>
          </div>
        </div>
        <p id="newsCount" class="card__meta" data-i18n="list.found">Найдено: 0</p>
        <div class="grid grid--cards" id="newsList" aria-live="polite"></div>
        <div class="pagination" id="newsPagination" aria-label="Пагинация" data-i18n-attr="aria-label:pagination.label"></div>
      </div>
    </section>
  </main>
  <div data-include="../partials/footer.html"></div>
  <script src="../assets/js/includes.js"></script>
  <script src="../assets/js/main.js"></script>
  <button class="back-nav" type="button" data-back-button aria-label="Назад" data-i18n-attr="aria-label:back.label">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 12H7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      <path d="M11 7l-5 5 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

</html>
