<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Документы — Государственное учреждение образования «Урицкая средняя школа»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-base="../">
  <a class="skip-link" href="#main" data-i18n="skip.link">Перейти к содержимому</a>
  <div data-include="../partials/header.html"></div>
  <main id="main">
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumbs" aria-label="Хлебные крошки">
          <a data-href="index.html" data-i18n="nav.home">Главная</a>
          <span>/</span>
          <span data-i18n="docs.title">Документы</span>
        </nav>
        <h1 data-i18n="docs.title">Документы</h1>
        <p class="lead" data-i18n="docs.lead">Нормативные документы, планы, отчеты и локальные акты.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="tabs" id="docsCategories" role="tablist" aria-label="Категории документов" data-i18n-attr="aria-label:docs.categories"></div>
        <div class="list-controls">
          <div class="input-group">
            <label class="label" for="docsSearch" data-i18n="docs.search.label">Поиск по документам</label>
            <input class="input" type="search" id="docsSearch" placeholder="Введите название документа" aria-label="Поиск по документам" data-i18n-attr="placeholder:docs.search.placeholder;aria-label:docs.search.aria" />
          </div>
        </div>
        <p id="docsCount" class="card__meta" data-i18n="list.found">Найдено: 0</p>
        <div class="table-wrapper">
          <table class="table" aria-label="Список документов" data-i18n-attr="aria-label:docs.table.label">
            <thead>
              <tr>
                <th data-i18n="docs.table.title">Название</th>
                <th data-i18n="docs.table.category">Категория</th>
                <th data-i18n="docs.table.date">Дата</th>
                <th data-i18n="docs.table.file">Файл</th>
              </tr>
            </thead>
            <tbody id="docsTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="docsPagination" aria-label="Пагинация" data-i18n-attr="aria-label:pagination.label"></div>
      </div>
    </section>
  </main>
  <div data-include="../partials/footer.html"></div>
  <script src="../assets/js/includes.js"></script>
  <script src="../assets/js/main.js"></script>
  <button class="back-nav" type="button" data-back-button aria-label="Назад" data-i18n-attr="aria-label:back.label">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19 12H7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      <path d="M11 7l-5 5 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

</body>
</html>
