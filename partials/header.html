<header class="header" data-header>
  <div class="container header__inner">
    <a class="logo" data-href="index.html" aria-label="Главная страница" data-i18n-attr="aria-label:header.homeAria">
      <span class="logo__mark" aria-hidden="true">
        <img data-src="лого.png" alt="" loading="lazy" />
      </span>
      <span class="logo__text">
        <span class="logo__title" data-i18n="logo.title">Урицкая средняя школа</span>
        <span class="logo__subtitle" data-i18n="logo.subtitle">Официальный сайт</span>
      </span>
    </a>
    <button class="nav-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="primary-nav" aria-label="Открыть меню" data-i18n-attr="aria-label:header.menuAria">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="nav" id="primary-nav" aria-label="Основная навигация" data-i18n-attr="aria-label:header.navAria">
      <ul class="nav__list">
        <li><a class="nav__link" data-section="home" data-href="index.html" data-i18n="nav.home">Главная</a></li>
        <li><a class="nav__link" data-section="news" data-href="news/index.html" data-i18n="nav.news">Новости</a></li>
        <li><a class="nav__link" data-href="index.html#achievements" data-i18n="nav.achievements">Наши достижения</a></li>
        <li><a class="nav__link" data-href="index.html#info-resources" data-i18n="nav.resources">Информационные ресурсы</a></li>
      </ul>
    </nav>
    <div class="header__actions">
      <div class="lang-switcher" role="group" aria-label="Выбор языка" data-i18n-attr="aria-label:lang.label">
        <button class="lang-btn" type="button" data-lang="ru" aria-pressed="false">
          <span class="lang-flag lang-flag--ru" aria-hidden="true"></span>
          <span data-i18n="lang.rus">Rus</span>
        </button>
        <button class="lang-btn" type="button" data-lang="be" aria-pressed="false">
          <span class="lang-flag lang-flag--be" aria-hidden="true"></span>
          <span data-i18n="lang.bel">Bel</span>
        </button>
        <button class="lang-btn" type="button" data-lang="en" aria-pressed="false">
          <span class="lang-flag lang-flag--en" aria-hidden="true"></span>
          <span data-i18n="lang.eng">Eng</span>
        </button>
      </div>
      <button class="btn btn--ghost" id="a11yToggle" type="button" aria-pressed="false" data-i18n="header.a11yOff">Версия для слабовидящих</button>
      <a class="btn btn--secondary" data-href="contacts/index.html" data-i18n="header.contact">Связаться</a>
    </div>
  </div>
</header>
